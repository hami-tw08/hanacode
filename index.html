<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花コード 暗記トレーナー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf6f0;--surface:#fff;--surface2:#f5ede0;--accent:#7c4f2a;--accent2:#c8893a;
  --accent-light:#f0d9b5;--text:#2a1a0a;--text-sub:#7a5c3a;
  --correct:#2d7a4f;--wrong:#9c2a2a;--border:#d4b896;--shadow:rgba(100,60,20,.13);
  --num-bg:#fdf8f0;--num-border:#c8a870;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif JP',serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

/* ── ヘッダー ── */
.hdr{width:100%;background:var(--accent);padding:10px 16px;display:flex;align-items:center;gap:10px}
.hdr-title{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;color:#fff8ee;
  white-space:nowrap;letter-spacing:.08em}
.prog-wrap{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.prog-bg{flex:1;height:6px;background:rgba(255,255,255,.22);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent2);border-radius:3px;transition:width .4s ease}
.prog-txt{font-size:.72rem;color:#f5d9a8;white-space:nowrap;font-family:'DM Mono',monospace}

/* フィルターバー */
.filter-bar{width:100%;max-width:480px;display:flex;gap:6px;padding:10px 14px 0}
.filter-btn{flex:1;padding:7px 4px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--num-bg);font-family:'Noto Serif JP',serif;font-size:.78rem;
  color:var(--text-sub);cursor:pointer;transition:all .15s;letter-spacing:.04em}
.filter-btn.active{background:var(--accent);color:#fff8ee;border-color:var(--accent)}
.filter-btn:hover:not(.active){background:var(--accent-light)}

/* メイン */
.main{width:100%;max-width:480px;display:flex;flex-direction:column;flex:1}
#sq{display:flex;flex-direction:column;flex:1}
#sr{display:none;flex-direction:column;flex:1}

/* 花カード */
.flower-card{background:var(--surface);margin:10px 14px 0;border-radius:16px;
  border:1.5px solid var(--border);overflow:hidden;box-shadow:0 4px 20px var(--shadow)}
.flower-img{width:100%;height:180px;background:var(--surface2);display:flex;
  align-items:center;justify-content:center;overflow:hidden}
.flower-img svg{width:100%;height:100%}
.flower-info{padding:10px 18px 12px;text-align:center;border-top:1px solid var(--accent-light)}
.flower-name{font-family:'Shippori Mincho',serif;font-size:1.45rem;font-weight:700;
  color:var(--accent);letter-spacing:.08em;line-height:1.3}
.flower-cat{display:inline-block;margin-top:5px;font-size:.68rem;background:var(--accent-light);
  color:var(--accent);padding:2px 10px;border-radius:99px;font-weight:600;letter-spacing:.04em}

/* 入力エリア */
.input-area{margin:10px 14px 0;display:flex;gap:8px;align-items:stretch}
.input-disp{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:12px;
  font-family:'DM Mono',monospace;font-size:1.9rem;font-weight:500;color:var(--accent);
  text-align:center;padding:8px 10px;letter-spacing:.25em;min-height:60px;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .2s;box-shadow:inset 0 2px 8px rgba(100,60,20,.06)}
.input-disp.has-val{border-color:var(--accent2)}
.cursor{display:inline-block;width:2px;height:1.25em;background:var(--accent);
  margin-left:2px;animation:blink 1s step-end infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}
.btn-ans{background:var(--accent);color:#fff8ee;border:none;border-radius:12px;
  font-family:'Noto Serif JP',serif;font-size:.95rem;font-weight:600;padding:0 18px;
  cursor:pointer;letter-spacing:.06em;transition:background .15s,transform .1s;white-space:nowrap}
.btn-ans:active{transform:scale(.95)}.btn-ans:hover{background:#5a3510}
.btn-ans:disabled{background:var(--border);cursor:default}

/* テンキー */
.numpad{margin:8px 14px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.num{background:var(--num-bg);border:1.5px solid var(--num-border);border-radius:12px;
  font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;color:var(--text);
  padding:13px 0;cursor:pointer;transition:background .1s,transform .08s;
  box-shadow:0 2px 6px var(--shadow);text-align:center;user-select:none}
.num:active{transform:scale(.92);background:var(--accent-light)}
.num:hover{background:var(--accent-light)}
.num.zero{grid-column:1/3}
.num.del{background:#fde8e8;border-color:#e0a0a0;color:var(--wrong);font-size:1.05rem}
.num.del:hover{background:#fbd0d0}

/* 結果画面 */
.result-card{margin:10px 14px 0;border-radius:16px;overflow:hidden;border:1.5px solid var(--border);
  box-shadow:0 4px 20px var(--shadow);flex:1;display:flex;flex-direction:column}
.result-top{padding:20px 20px 16px;display:flex;flex-direction:column;align-items:center;
  gap:10px;background:var(--surface);flex:1}
.result-badge{font-size:2.8rem;line-height:1}
.result-label{font-family:'Shippori Mincho',serif;font-size:1.7rem;font-weight:700;letter-spacing:.12em}
.result-label.ok{color:var(--correct)}.result-label.ng{color:var(--wrong)}
.result-img{width:120px;height:120px;border-radius:12px;overflow:hidden;
  border:2px solid var(--border);background:var(--surface2);
  display:flex;align-items:center;justify-content:center}
.result-img svg{width:100%;height:100%}
.result-detail{text-align:center;line-height:1.85}
.r-name{font-family:'Shippori Mincho',serif;font-size:1.35rem;font-weight:700;color:var(--accent)}
.r-code{font-family:'DM Mono',monospace;font-size:1.25rem;color:var(--correct);font-weight:600}
.r-ans-ng{font-family:'DM Mono',monospace;font-size:1.05rem;color:var(--wrong)}
.r-correct-code{font-family:'DM Mono',monospace;font-size:1.65rem;font-weight:700;color:var(--wrong)}
.score-bar{background:var(--surface2);border-top:1px solid var(--border);
  padding:9px 20px;display:flex;justify-content:space-between;
  font-size:.8rem;color:var(--text-sub);font-family:'DM Mono',monospace}
.sc-ok{color:var(--correct);font-weight:700}.sc-ng{color:var(--wrong);font-weight:700}
.btn-next{margin:8px 14px 14px;display:block;width:calc(100% - 28px);padding:15px;
  background:var(--accent);color:#fff8ee;border:none;border-radius:12px;
  font-family:'Shippori Mincho',serif;font-size:1.05rem;font-weight:700;letter-spacing:.12em;
  cursor:pointer;transition:background .15s,transform .1s;box-shadow:0 4px 12px var(--shadow)}
.btn-next:hover{background:#5a3510}.btn-next:active{transform:scale(.97)}

/* 完了画面 */
#sd{display:none;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:40px 20px;text-align:center;gap:14px}
.done-em{font-size:3.8rem}
.done-title{font-family:'Shippori Mincho',serif;font-size:1.7rem;font-weight:700;
  color:var(--accent);letter-spacing:.1em}
.done-score{font-family:'DM Mono',monospace;font-size:1.1rem;color:var(--text-sub)}
.btn-restart{margin-top:8px;padding:13px 36px;background:var(--accent);color:#fff8ee;
  border:none;border-radius:12px;font-family:'Shippori Mincho',serif;font-size:1.05rem;
  font-weight:700;letter-spacing:.1em;cursor:pointer;transition:background .15s}
.btn-restart:hover{background:#5a3510}

/* ── セット選択画面 ── */
#s-select{display:flex;flex-direction:column;width:100%;max-width:480px;padding-bottom:24px}
.set-header{padding:14px 16px 8px;text-align:center}
.set-header-title{font-size:1rem;font-weight:700;color:var(--accent);letter-spacing:.05em}
.set-header-sub{font-size:.75rem;color:var(--text-sub);margin-top:3px}
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px}
.set-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  padding:12px 10px;cursor:pointer;transition:all .15s;position:relative;min-height:80px;
  display:flex;flex-direction:column;gap:3px}
.set-card:hover:not(.locked){background:var(--accent-light);border-color:var(--accent)}
.set-card.passed{border-color:#2d7a4f;background:#f0faf4}
.set-card.locked{opacity:.45;cursor:default;background:#f4f0ec}
.set-num{font-size:.82rem;font-weight:700;color:var(--accent)}
.set-card.passed .set-num{color:#2d7a4f}
.set-range{font-size:.68rem;color:var(--text-sub);line-height:1.3;margin-top:1px}
.set-count{font-size:.72rem;color:var(--text-sub)}
.set-pct{font-size:.85rem;font-weight:700;margin-top:2px}
.set-pct.ok{color:#2d7a4f}
.set-pct.ng{color:#9c2a2a}
.lock-icon{position:absolute;top:8px;right:10px;font-size:1rem;opacity:.6}
.btn-all-test{margin:16px 14px 0;padding:12px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--surface2);font-family:'Noto Serif JP',serif;font-size:.85rem;
  color:var(--text-sub);cursor:pointer;transition:all .15s;letter-spacing:.04em}
.btn-all-test:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

/* ── 学習フェーズ ── */
#s-learn{display:none;flex-direction:column;width:100%;max-width:480px;align-items:stretch}
.learn-bar{display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px 4px;gap:8px}
.learn-badge{background:var(--accent2);color:#fff8ee;font-size:.72rem;
  padding:3px 10px;border-radius:20px;letter-spacing:.04em}
#learn-prog{font-size:.82rem;color:var(--text-sub);font-family:'DM Mono',monospace}
.learn-code-wrap{background:var(--surface);border:2px solid var(--accent-light);
  border-radius:14px;margin:10px 14px 0;padding:14px 16px;text-align:center}
.learn-code-label{font-size:.75rem;color:var(--text-sub);letter-spacing:.06em;margin-bottom:6px}
.learn-code{font-size:2.6rem;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;
  letter-spacing:.1em}
.learn-nav{display:flex;gap:10px;padding:12px 14px 0}
.btn-learn-prev,.btn-learn-next{flex:1;padding:11px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--num-bg);
  font-family:'Noto Serif JP',serif;font-size:.88rem;color:var(--text-sub);
  cursor:pointer;transition:all .15s}
.btn-learn-prev:hover:not(:disabled),.btn-learn-next:hover{background:var(--accent-light);border-color:var(--accent)}
.btn-learn-prev:disabled{opacity:.3;cursor:default}
.btn-start-test{margin:12px 14px 0;padding:13px;border-radius:12px;
  background:var(--accent);color:#fff8ee;border:none;
  font-family:'Noto Serif JP',serif;font-size:.92rem;font-weight:700;
  cursor:pointer;transition:background .15s;letter-spacing:.06em}
.btn-start-test:hover{background:#5a3510}
.btn-back-select{display:block;margin:8px auto 12px;background:none;border:none;
  font-family:'Noto Serif JP',serif;font-size:.8rem;color:var(--text-sub);
  cursor:pointer;letter-spacing:.04em;padding:6px 12px;border-radius:8px}
.btn-back-select:hover{background:var(--accent-light);color:var(--accent)}

/* ── テスト画面のセットラベル ── */
.set-label-bar{text-align:center;font-size:.78rem;color:var(--text-sub);
  padding:8px 16px 0;letter-spacing:.04em}

/* ── 完了画面の追加要素 ── */
.done-pass{text-align:center;padding:0 20px;font-size:.85rem;margin-top:4px}
.pass-badge{color:#2d7a4f;font-weight:700}
.fail-badge{color:#9c2a2a;line-height:1.6}
.done-actions{display:flex;flex-direction:column;gap:10px;padding:0 20px;width:100%;margin-top:6px}
.btn-learn-again,.btn-back-select2{width:100%;padding:12px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--num-bg);
  font-family:'Noto Serif JP',serif;font-size:.88rem;color:var(--text-sub);
  cursor:pointer;transition:all .15s;letter-spacing:.04em}
.btn-learn-again:hover,.btn-back-select2:hover{background:var(--accent-light);border-color:var(--accent)}

/* ── main-wrap ── */
#main-wrap{width:100%;max-width:480px;display:flex;flex-direction:column;flex:1}
#sq,#sr,#sd,#s-select,#s-learn{display:none;flex-direction:column;flex:1}

</style>
</head>

<body>

<div class="hdr">
  <div class="hdr-title">🌸 花コード暗記</div>
  <div class="prog-wrap">
    <div class="prog-bg"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    <div class="prog-txt" id="pt">0/0</div>
  </div>
</div>

<div id="main-wrap">

  <!-- ★ セット選択画面 -->
  <div id="s-select">
    <div class="filter-bar" style="padding:12px 14px 0">
      <button class="filter-btn active" id="fb-all"   onclick="setFilter('all')">全て (190)</button>
      <button class="filter-btn"        id="fb-kiri"  onclick="setFilter('切り花')">切り花 (130)</button>
      <button class="filter-btn"        id="fb-hachi" onclick="setFilter('鉢物')">鉢物 (60)</button>
    </div>
    <div class="set-header">
      <div class="set-header-title">セットを選んで学習</div>
      <div class="set-header-sub">各セット20問 ・ 正答率80%以上で合格 🎖</div>
    </div>
    <div class="set-grid" id="set-grid"></div>
    <button class="btn-all-test" onclick="startAllTest()">📋 全問テストモード</button>
  </div>

  <!-- ★ 学習フェーズ（フラッシュカード） -->
  <div id="s-learn" style="display:none">
    <div class="learn-bar">
      <span id="learn-prog">1 / 20</span>
      <span class="learn-badge">学習モード</span>
    </div>
    <div class="flower-card">
      <div class="flower-img" id="learn-img"></div>
      <div class="flower-info">
        <div class="flower-name" id="learn-name">—</div>
        <span class="flower-cat" id="learn-cat"></span>
      </div>
    </div>
    <div class="learn-code-wrap">
      <div class="learn-code-label">コード番号</div>
      <div class="learn-code" id="learn-code">—</div>
    </div>
    <div class="learn-nav">
      <button class="btn-learn-prev" id="btn-lprev" onclick="learnPrev()">← 前へ</button>
      <button class="btn-learn-next" id="btn-lnext" onclick="learnNext()">次へ →</button>
    </div>
    <button class="btn-start-test" onclick="startSetTest()">✏️ このセットをテスト</button>
    <button class="btn-back-select" onclick="showSelect()">← セット選択に戻る</button>
  </div>

  <!-- テスト画面（問題） -->
  <div id="sq" style="display:none">
    <div class="set-label-bar" id="set-label-bar"></div>
    <div class="flower-card">
      <div class="flower-img" id="img-wrap"></div>
      <div class="flower-info">
        <div class="flower-name" id="fn">—</div>
        <span class="flower-cat"  id="fc"></span>
      </div>
    </div>
    <div class="input-area">
      <div class="input-disp" id="id"><span class="cursor"></span></div>
      <button class="btn-ans" id="ba" onclick="checkAns()" disabled>回答</button>
    </div>
    <div class="numpad">
      <button class="num" onclick="pn('7')">7</button>
      <button class="num" onclick="pn('8')">8</button>
      <button class="num" onclick="pn('9')">9</button>
      <button class="num" onclick="pn('4')">4</button>
      <button class="num" onclick="pn('5')">5</button>
      <button class="num" onclick="pn('6')">6</button>
      <button class="num" onclick="pn('1')">1</button>
      <button class="num" onclick="pn('2')">2</button>
      <button class="num" onclick="pn('3')">3</button>
      <button class="num zero" onclick="pn('0')">0</button>
      <button class="num del"  onclick="pb()">⌫</button>
    </div>
    <button class="btn-back-select" onclick="showSelect()" style="margin:6px auto 12px">← セット選択に戻る</button>
  </div>

  <!-- 結果画面 -->
  <div id="sr" style="display:none">
    <div class="set-label-bar" id="set-label-bar-r"></div>
    <div class="result-card">
      <div class="result-top">
        <div class="result-badge" id="rb"></div>
        <div class="result-label" id="rl"></div>
        <div class="result-img" id="ri"></div>
        <div class="result-detail" id="rd"></div>
      </div>
      <div class="score-bar">
        <span>正解 <span class="sc-ok" id="sok">0</span></span>
        <span>不正解 <span class="sc-ng" id="sng">0</span></span>
        <span>計 <span id="stot">0</span></span>
      </div>
    </div>
    <button class="btn-next" onclick="nextQ()">次へ →</button>
  </div>

  <!-- セット完了画面 -->
  <div id="sd" style="display:none">
    <div class="done-em" id="done-em">🎉</div>
    <div class="done-title" id="done-title">セット完了！</div>
    <div class="done-score" id="ds"></div>
    <div class="done-pass" id="done-pass"></div>
    <div class="done-actions">
      <button class="btn-restart" onclick="retrySet()">🔄 もう一度</button>
      <button class="btn-learn-again" onclick="startLearnPhase()">📖 再学習</button>
      <button class="btn-back-select2" onclick="showSelect()">← セット選択</button>
    </div>
  </div>

</div><!-- /main-wrap -->

<script>

function getSVG(no){ return S[svgMap[no]] || S.default_kiri; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ── 状態 ──────────────────────────────────────────
const SET_SIZE = 20;
let filterMode = 'all';
let allFlowers = FLOWERS;
let setResults  = {};   // { setIdx: { ok, ng, passed } }

// テスト状態
let currentSetIdx = -1; // -1 = 全問テスト
let queue = [], current = null, inputVal = '', scoreOk = 0, scoreNg = 0;
let setFlowers = []; // 今のセットの全花
let isAllTest = false;

// 学習フェーズ状態
let learnList = [], learnIdx = 0;

// ── フィルター ────────────────────────────────────
function setFilter(mode){
  filterMode = mode;
  ['all','切り花','鉢物'].forEach(m=>{
    const id = m==='all'?'fb-all': m==='切り花'?'fb-kiri':'fb-hachi';
    document.getElementById(id).classList.toggle('active', m===mode);
  });
  allFlowers = filterMode==='all' ? FLOWERS : FLOWERS.filter(f=>f.cat===filterMode);
  setResults = {};
  buildSetGrid();
}

// ── セット選択画面 ────────────────────────────────
function showSelect(){
  showScreen('select');
  buildSetGrid();
  document.getElementById('pf').style.width='0%';
  document.getElementById('pt').textContent='';
}

function buildSetGrid(){
  const grid = document.getElementById('set-grid');
  const sets = makeSets();
  const total = sets.length;
  let passedCount = 0;
  grid.innerHTML = sets.map((s,i)=>{
    const res = setResults[i] || {};
    const passed = res.passed || false;
    if(passed) passedCount++;
    const pct = (res.ok!==undefined) ? Math.round(res.ok/(res.ok+res.ng)*100) : null;
    const locked = i>0 && !(setResults[i-1]||{}).passed;
    const cls = passed?'set-card passed': locked?'set-card locked':'set-card';
    const badge = passed?'🎖':'';
    const pctStr = pct!==null ? `<span class="set-pct ${passed?'ok':'ng'}">${pct}%</span>` : '';
    const lockIcon = locked ? '<div class="lock-icon">🔒</div>' : '';
    return `<div class="${cls}" onclick="${locked?'':'selectSet('+i+')'}" data-set="${i}">
      ${lockIcon}
      <div class="set-num">セット ${i+1} ${badge}</div>
      <div class="set-range">${s[0].name} 〜 ${s[s.length-1].name}</div>
      <div class="set-count">${s.length}問</div>
      ${pctStr}
    </div>`;
  }).join('');
  // 全体進捗
  const pct = total ? Math.round(passedCount/total*100) : 0;
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pt').textContent = passedCount+'/'+total+' セット合格';
}

function makeSets(){
  const sets = [];
  for(let i=0;i<allFlowers.length;i+=SET_SIZE){
    sets.push(allFlowers.slice(i, i+SET_SIZE));
  }
  return sets;
}

function selectSet(idx){
  currentSetIdx = idx;
  isAllTest = false;
  setFlowers = makeSets()[idx];
  startLearnPhase();
}

// ── 学習フェーズ ──────────────────────────────────
function startLearnPhase(){
  learnList = [...setFlowers];
  learnIdx = 0;
  showScreen('learn');
  renderLearnCard();
}

function renderLearnCard(){
  const f = learnList[learnIdx];
  document.getElementById('learn-img').innerHTML = getSVG(f.no);
  document.getElementById('learn-name').textContent = f.name;
  document.getElementById('learn-cat').textContent = f.cat;
  document.getElementById('learn-code').textContent = f.no;
  document.getElementById('learn-prog').textContent = (learnIdx+1)+' / '+learnList.length;
  document.getElementById('btn-lprev').disabled = (learnIdx===0);
  document.getElementById('btn-lnext').textContent = learnIdx===learnList.length-1 ? '✏️ テストへ' : '次へ →';
}

function learnNext(){
  if(learnIdx < learnList.length-1){
    learnIdx++;
    renderLearnCard();
  } else {
    startSetTest();
  }
}
function learnPrev(){
  if(learnIdx>0){ learnIdx--; renderLearnCard(); }
}

// ── テストフェーズ ────────────────────────────────
function startSetTest(){
  queue = shuffle([...setFlowers]);
  scoreOk=0; scoreNg=0; inputVal='';
  const lbl = `セット ${currentSetIdx+1} テスト`;
  document.getElementById('set-label-bar').textContent = lbl;
  document.getElementById('set-label-bar-r').textContent = lbl;
  updateScore();
  showScreen('q');
  nextQ();
}

function startAllTest(){
  currentSetIdx = -1;
  isAllTest = true;
  setFlowers = allFlowers;
  queue = shuffle([...allFlowers]);
  scoreOk=0; scoreNg=0; inputVal='';
  document.getElementById('set-label-bar').textContent = '全問テストモード';
  document.getElementById('set-label-bar-r').textContent = '全問テストモード';
  updateScore();
  showScreen('q');
  nextQ();
}

function nextQ(){
  if(queue.length===0){ showDone(); return; }
  current=queue.shift(); inputVal='';
  renderQ(); showScreen('q');
}

function renderQ(){
  document.getElementById('fn').textContent = current.name;
  document.getElementById('fc').textContent = current.cat;
  document.getElementById('img-wrap').innerHTML = getSVG(current.no);
  updateInputDisp(); updateProgress();
}

function updateProgress(){
  const total = setFlowers.length;
  const done  = total - queue.length;
  const pct   = total ? (done/total*100) : 0;
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pt').textContent = done+'/'+total;
}

function updateInputDisp(){
  const el=document.getElementById('id');
  const btn=document.getElementById('ba');
  if(inputVal===''){el.innerHTML='<span class="cursor"></span>';el.classList.remove('has-val');btn.disabled=true;}
  else{el.innerHTML=inputVal+'<span class="cursor"></span>';el.classList.add('has-val');btn.disabled=false;}
}

function pn(n){ if(inputVal.length>=4)return; inputVal+=n; updateInputDisp(); }
function pb(){ if(!inputVal.length)return; inputVal=inputVal.slice(0,-1); updateInputDisp(); }

function checkAns(){
  if(!current||!inputVal)return;
  const ok = parseInt(inputVal,10)===current.no;
  if(ok) scoreOk++; else scoreNg++;
  renderResult(ok); showScreen('r');
}

function renderResult(ok){
  document.getElementById('rb').textContent = ok?'✅':'❌';
  const lbl=document.getElementById('rl');
  lbl.textContent = ok?'正　解':'不正解';
  lbl.className = 'result-label '+(ok?'ok':'ng');
  document.getElementById('ri').innerHTML = getSVG(current.no);
  const det=document.getElementById('rd');
  if(ok){
    det.innerHTML=`<div class="r-name">${current.name}</div>
      <div style="margin-top:4px;font-size:.75rem;color:var(--text-sub)">${current.cat}</div>
      <div style="margin-top:10px;">コード番号 <span class="r-code">${current.no}</span></div>`;
  } else {
    det.innerHTML=`<div class="r-name">${current.name}</div>
      <div style="margin-top:4px;font-size:.75rem;color:var(--text-sub)">${current.cat}</div>
      <div class="r-ans-ng" style="margin-top:10px;">あなたの回答：${inputVal}</div>
      <div style="margin-top:5px;font-size:.85rem;color:var(--text-sub)">正解のコード</div>
      <div class="r-correct-code">${current.no}</div>`;
  }
  updateScore();
}

function updateScore(){
  document.getElementById('sok').textContent=scoreOk;
  document.getElementById('sng').textContent=scoreNg;
  document.getElementById('stot').textContent=scoreOk+scoreNg;
}

function showDone(){
  const tot=scoreOk+scoreNg, pct=tot?Math.round(scoreOk/tot*100):0;
  const passed = pct>=80;

  // セット結果を記録
  if(!isAllTest && currentSetIdx>=0){
    setResults[currentSetIdx] = { ok:scoreOk, ng:scoreNg, passed };
    // 次のセットを自動解放（何もしなくてもbuildSetGridで解放される）
  }

  document.getElementById('done-em').textContent = passed ? '🎖' : (pct>=60?'😊':'💪');
  document.getElementById('done-title').textContent = isAllTest ? '全問テスト完了！' : `セット ${currentSetIdx+1} 完了！`;
  document.getElementById('ds').textContent = `${tot}問中 ${scoreOk}問正解（${pct}%）`;

  const passEl = document.getElementById('done-pass');
  if(isAllTest){
    passEl.textContent='';
  } else if(passed){
    passEl.innerHTML='<span class="pass-badge">🎖 合格！次のセットが解放されました</span>';
  } else {
    passEl.innerHTML=`<span class="fail-badge">合格ライン80%まであと${80-pct}%<br>もう一度チャレンジしてみましょう</span>`;
  }

  document.getElementById('pf').style.width='100%';
  document.getElementById('pt').textContent=tot+'/'+tot;
  showScreen('done');
}

function retrySet(){
  if(isAllTest) startAllTest();
  else startSetTest();
}

function showScreen(s){
  ['select','learn','q','r','done'].forEach(id=>{
    const el=document.getElementById(id==='select'?'s-select':id==='learn'?'s-learn':id==='q'?'sq':id==='r'?'sr':'sd');
    if(el) el.style.display = s===id?'flex':'none';
  });
}

// キーボード対応
document.addEventListener('keydown',e=>{
  const isQ=document.getElementById('sq').style.display!=='none';
  const isR=document.getElementById('sr').style.display!=='none';
  const isL=document.getElementById('s-learn').style.display!=='none';
  if(isQ){
    if(e.key>='0'&&e.key<='9') pn(e.key);
    else if(e.key==='Backspace') pb();
    else if(e.key==='Enter') checkAns();
  } else if(isR){
    if(e.key==='Enter') nextQ();
  } else if(isL){
    if(e.key==='ArrowRight'||e.key===' ') learnNext();
    else if(e.key==='ArrowLeft') learnPrev();
  }
});

// 起動
showSelect();
</script>
</body>
</html>
