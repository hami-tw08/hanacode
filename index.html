<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 花コード暗記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@700&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf6f0;--surface:#fff;--surface2:#f5ede0;--accent:#7c4f2a;--accent2:#c8893a;
  --accent-light:#f0d9b5;--text:#2a1a0a;--text-sub:#7a5c3a;
  --correct:#2d7a4f;--wrong:#9c2a2a;--border:#d4b896;--shadow:rgba(100,60,20,.13);
  --num-bg:#fdf8f0;--num-border:#c8a870;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Serif JP',serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

/* ヘッダー */
.hdr{width:100%;background:var(--accent);padding:10px 16px;display:flex;align-items:center;gap:10px}
.hdr-title{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;color:#fff8ee;
  white-space:nowrap;letter-spacing:.08em}
.prog-wrap{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.prog-bg{flex:1;height:6px;background:rgba(255,255,255,.22);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent2);border-radius:3px;transition:width .4s ease}
.prog-txt{font-size:.72rem;color:#f5d9a8;white-space:nowrap;font-family:'DM Mono',monospace}

/* メインラップ */
#main-wrap{width:100%;max-width:480px;display:flex;flex-direction:column;flex:1}

/* ── セット選択 ── */
#s-select{display:none;flex-direction:column;width:100%;padding-bottom:28px}
.filter-bar{display:flex;gap:6px;padding:10px 14px 0}
.filter-btn{flex:1;padding:7px 4px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--num-bg);font-family:'Noto Serif JP',serif;font-size:.78rem;
  color:var(--text-sub);cursor:pointer;transition:all .15s;letter-spacing:.04em}
.filter-btn.active{background:var(--accent);color:#fff8ee;border-color:var(--accent)}
.filter-btn:hover:not(.active){background:var(--accent-light)}
.set-header{padding:14px 16px 8px;text-align:center}
.set-header-title{font-size:1rem;font-weight:700;color:var(--accent);letter-spacing:.05em}
.set-header-sub{font-size:.74rem;color:var(--text-sub);margin-top:3px}
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 14px}
.set-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  padding:12px 10px;cursor:pointer;transition:all .15s;position:relative;
  display:flex;flex-direction:column;gap:3px;min-height:82px}
.set-card:hover:not(.locked){background:var(--accent-light);border-color:var(--accent)}
.set-card.passed{border-color:#2d7a4f;background:#f0faf4}
.set-num{font-size:.82rem;font-weight:700;color:var(--accent)}
.set-card.passed .set-num{color:#2d7a4f}
.set-range{font-size:.66rem;color:var(--text-sub);line-height:1.35;margin-top:1px}
.set-count{font-size:.7rem;color:var(--text-sub)}
.set-pct{font-size:.84rem;font-weight:700;margin-top:2px}
.set-pct.ok{color:#2d7a4f}.set-pct.ng{color:#9c2a2a}
.lock-icon{position:absolute;top:8px;right:9px;font-size:.95rem;opacity:.5}
.btn-all-test{margin:14px 14px 0;padding:12px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--surface2);
  font-family:'Noto Serif JP',serif;font-size:.84rem;color:var(--text-sub);
  cursor:pointer;transition:all .15s;letter-spacing:.04em}
.btn-all-test:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

/* ── 学習フェーズ ── */
#s-learn{display:none;flex-direction:column;width:100%;max-width:480px}
.learn-topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 4px}
.learn-badge{background:var(--accent2);color:#fff8ee;font-size:.7rem;
  padding:3px 10px;border-radius:20px;letter-spacing:.04em}
#learn-prog{font-size:.8rem;color:var(--text-sub);font-family:'DM Mono',monospace}

/* 学習カード */
.learn-card{background:var(--surface);margin:6px 14px 0;border-radius:16px;
  border:1.5px solid var(--border);overflow:hidden;box-shadow:0 4px 16px var(--shadow)}
.learn-img-wrap{width:100%;height:min(55vw,280px);background:var(--surface2);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
#learn-svg-slot,#q-svg-slot{width:100%;display:flex;align-items:center;justify-content:center}
.learn-img-wrap svg{max-height:min(52vw,260px);max-width:100%;display:block}
.learn-photo{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:0;z-index:2}
.learn-photo-credit{position:absolute;bottom:3px;right:6px;font-size:.58rem;
  color:rgba(255,255,255,.75);background:rgba(0,0,0,.35);padding:1px 5px;border-radius:4px;z-index:3}
.learn-info{padding:10px 14px 12px}
.learn-name-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.learn-name{font-size:1.15rem;font-weight:700;color:var(--text)}
.learn-cat-badge{font-size:.68rem;color:var(--text-sub);border:1px solid var(--border);
  padding:2px 7px;border-radius:12px}
.learn-code-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.learn-code-label{font-size:.72rem;color:var(--text-sub)}
.learn-code-num{font-size:1.8rem;font-weight:700;color:var(--accent);
  font-family:'DM Mono',monospace;letter-spacing:.08em}
/* 特徴ヒント */
.learn-hint{margin-top:8px;padding:8px 10px;background:var(--surface2);
  border-radius:8px;font-size:.76rem;color:var(--text-sub);line-height:1.65;border-left:3px solid var(--accent2)}
.learn-season{display:inline-flex;align-items:center;gap:4px;margin-top:5px;
  font-size:.7rem;color:var(--accent);background:var(--accent-light);
  padding:2px 8px;border-radius:10px}

.learn-nav{display:flex;gap:10px;padding:10px 14px 0}
.btn-lnav{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--num-bg);font-family:'Noto Serif JP',serif;font-size:.86rem;
  color:var(--text-sub);cursor:pointer;transition:all .15s}
.btn-lnav:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent)}
.btn-lnav:disabled{opacity:.28;cursor:default}
.btn-start-test{margin:10px 14px 0;padding:13px;border-radius:12px;
  background:var(--accent);color:#fff8ee;border:none;
  font-family:'Noto Serif JP',serif;font-size:.9rem;font-weight:700;
  cursor:pointer;transition:background .15s;letter-spacing:.06em}
.btn-start-test:hover{background:#5a3510}
.btn-back{display:block;margin:8px auto 12px;background:none;border:none;
  font-family:'Noto Serif JP',serif;font-size:.78rem;color:var(--text-sub);
  cursor:pointer;padding:5px 12px;border-radius:8px}
.btn-back:hover{background:var(--accent-light);color:var(--accent)}

/* ── テスト・問題画面 ── */
#sq{display:none;flex-direction:column;width:100%;max-width:480px}
.set-label-bar{text-align:center;font-size:.76rem;color:var(--text-sub);
  padding:8px 16px 0;letter-spacing:.04em}
.quiz-mode-badge{display:inline-block;font-size:.68rem;padding:2px 8px;border-radius:10px;
  margin-left:6px;vertical-align:middle}
.quiz-mode-badge.forward{background:#e8f0ff;color:#3355aa}
.quiz-mode-badge.reverse{background:#fff0e8;color:#aa5533}
.quiz-mode-badge.review{background:#fff0f0;color:#aa2222}

/* 花カード（問題） */
.flower-card{background:var(--surface);margin:8px 14px 0;border-radius:16px;
  border:1.5px solid var(--border);overflow:hidden;box-shadow:0 4px 20px var(--shadow)}
.flower-img{width:100%;height:min(55vw,280px);background:var(--surface2);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.flower-img svg{max-height:min(52vw,260px);max-width:100%;display:block}
.flower-photo{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:2}
.flower-photo-credit{position:absolute;bottom:3px;right:6px;font-size:.58rem;
  color:rgba(255,255,255,.75);background:rgba(0,0,0,.35);padding:1px 5px;border-radius:4px;z-index:3}
.flower-info{padding:8px 14px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flower-name{font-size:1.05rem;font-weight:700;color:var(--text)}
.flower-cat{font-size:.68rem;color:var(--text-sub);border:1px solid var(--border);
  padding:2px 7px;border-radius:12px}

/* コード表示（逆方向問題） */
.reverse-code-disp{width:100%;height:90px;background:var(--surface2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.reverse-code-label{font-size:.75rem;color:var(--text-sub)}
.reverse-code-num{font-size:2.8rem;font-weight:700;color:var(--accent);
  font-family:'DM Mono',monospace;letter-spacing:.1em}

/* 選択肢（逆方向問題） */
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px 0}
.choice-btn{padding:12px 8px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--num-bg);font-family:'Noto Serif JP',serif;font-size:.84rem;
  color:var(--text);cursor:pointer;transition:all .15s;text-align:center;line-height:1.35}
.choice-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.choice-btn.correct{background:#d4f4e0;border-color:#2d7a4f;color:#1a5a2a}
.choice-btn.wrong{background:#fde0e0;border-color:#9c2a2a;color:#7a1a1a}
.choice-btn:disabled{cursor:default}

/* ヒント表示（問題画面） */
.q-hint{margin:6px 14px 0;padding:8px 12px;background:var(--surface2);border-radius:10px;
  font-size:.73rem;color:var(--text-sub);line-height:1.6;border-left:3px solid var(--accent2)}
.q-hint-season{font-size:.68rem;color:var(--accent);margin-top:3px}

/* 入力エリア */
.input-area{display:flex;gap:10px;padding:10px 14px 0;align-items:center}
.input-disp{flex:1;min-height:52px;background:var(--surface);border:2px solid var(--border);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;font-family:'DM Mono',monospace;font-weight:700;color:var(--accent);
  letter-spacing:.12em;transition:border-color .15s}
.input-disp.has-val{border-color:var(--accent2)}
.cursor{display:inline-block;width:2px;height:1.1em;background:var(--accent2);
  margin-left:2px;animation:blink .9s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.btn-ans{padding:0 18px;height:52px;border-radius:12px;background:var(--accent);
  color:#fff8ee;border:none;font-family:'Noto Serif JP',serif;font-size:.9rem;
  cursor:pointer;transition:background .15s;white-space:nowrap;font-weight:700}
.btn-ans:disabled{background:#c8b090;cursor:default}
.btn-ans:not(:disabled):hover{background:#5a3510}

/* テンキー */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 14px 0}
.num{padding:14px;border-radius:12px;border:1.5px solid var(--num-border);
  background:var(--num-bg);font-family:'DM Mono',monospace;font-size:1.3rem;
  font-weight:700;color:var(--accent);cursor:pointer;transition:all .1s;text-align:center}
.num:hover{background:var(--accent-light);border-color:var(--accent)}
.num:active{transform:scale(.93)}
.num.zero{grid-column:1/2}.num.del{grid-column:3/4;font-size:1rem}

/* ── 結果画面 ── */
#sr{display:none;flex-direction:column;width:100%;max-width:480px}
.result-card{background:var(--surface);margin:10px 14px 0;border-radius:16px;
  border:1.5px solid var(--border);overflow:hidden;box-shadow:0 4px 20px var(--shadow);padding:16px 14px 12px}
.result-top{display:flex;flex-direction:column;align-items:center;gap:6px}
.result-badge{font-size:2.2rem}
.result-label{font-size:1rem;font-weight:700;letter-spacing:.08em}
.result-label.ok{color:var(--correct)}.result-label.ng{color:var(--wrong)}
.result-img{width:180px;height:180px;background:var(--surface2);border-radius:12px;
  overflow:hidden;display:flex;align-items:center;justify-content:center;margin:4px 0}
.result-img svg{max-width:100%;max-height:100%}
.result-img img{width:100%;height:100%;object-fit:cover}
.result-detail{text-align:center;width:100%}
.r-name{font-size:1rem;font-weight:700}
.r-code{font-size:1.3rem;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace}
.r-ans-ng{font-size:.82rem;color:var(--wrong)}
.r-correct-code{font-size:2rem;font-weight:700;color:var(--wrong);font-family:'DM Mono',monospace}
.score-bar{display:flex;justify-content:space-around;margin-top:10px;padding-top:10px;
  border-top:1px solid var(--border);font-size:.8rem;color:var(--text-sub)}
.sc-ok{color:var(--correct);font-weight:700}.sc-ng{color:var(--wrong);font-weight:700}
.btn-next{margin:12px 14px;padding:14px;border-radius:12px;background:var(--accent);
  color:#fff8ee;border:none;font-family:'Noto Serif JP',serif;font-size:.92rem;
  font-weight:700;cursor:pointer;transition:background .15s;letter-spacing:.06em}
.btn-next:hover{background:#5a3510}

/* ── 完了画面 ── */
#sd{display:none;flex-direction:column;align-items:center;width:100%;max-width:480px;
  padding:30px 20px 40px;gap:10px}
.done-em{font-size:3rem}
.done-title{font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:.05em}
.done-score{font-size:.88rem;color:var(--text-sub)}
.done-pass{text-align:center;font-size:.84rem}
.pass-badge{color:#2d7a4f;font-weight:700}
.fail-badge{color:#9c2a2a;line-height:1.7}
.done-actions{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:8px}
.btn-restart{width:100%;padding:13px;border-radius:12px;background:var(--accent);
  color:#fff8ee;border:none;font-family:'Noto Serif JP',serif;font-size:.9rem;
  font-weight:700;cursor:pointer;transition:background .15s;letter-spacing:.05em}
.btn-restart:hover{background:#5a3510}
.btn-sub-action{width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--num-bg);font-family:'Noto Serif JP',serif;font-size:.86rem;
  color:var(--text-sub);cursor:pointer;transition:all .15s;letter-spacing:.04em}
.btn-sub-action:hover{background:var(--accent-light);border-color:var(--accent)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🌸 花コード暗記</div>
  <div class="prog-wrap">
    <div class="prog-bg"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    <div class="prog-txt" id="pt"></div>
  </div>
</div>

<div id="main-wrap">

  <!-- セット選択 -->
  <div id="s-select">
    <div class="filter-bar">
      <button class="filter-btn active" id="fb-all"   onclick="setFilter('all')">全て (190)</button>
      <button class="filter-btn"        id="fb-kiri"  onclick="setFilter('切り花')">切り花 (130)</button>
      <button class="filter-btn"        id="fb-hachi" onclick="setFilter('鉢物')">鉢物 (60)</button>
    </div>
    <div class="set-header">
      <div class="set-header-title">セットを選んで学習</div>
      <div class="set-header-sub">📖 学習 → ✏️ テスト の2段階 ・ 合格ライン 80%</div>
    </div>
    <div class="set-grid" id="set-grid"></div>
    <button class="btn-all-test" onclick="startAllTest()">📋 全問テストモード（190問）</button>
  </div>

  <!-- 学習フェーズ -->
  <div id="s-learn">
    <div class="learn-topbar">
      <span id="learn-prog">1 / 20</span>
      <span class="learn-badge">📖 学習モード</span>
    </div>
    <div class="learn-card">
      <div class="learn-img-wrap" id="learn-img-wrap">
        <div id="learn-svg-slot"></div>
        <img id="learn-photo" class="learn-photo" style="display:none" alt="">
        <span class="learn-photo-credit" id="learn-photo-credit" style="display:none"></span>
      </div>
      <div class="learn-info">
        <div class="learn-name-row">
          <div class="learn-name" id="learn-name">—</div>
          <span class="learn-cat-badge" id="learn-cat"></span>
        </div>
        <div class="learn-code-row">
          <span class="learn-code-label">コード番号</span>
          <span class="learn-code-num" id="learn-code">—</span>
        </div>
        <div class="learn-hint" id="learn-hint"></div>
        <div class="learn-season" id="learn-season"></div>
      </div>
    </div>
    <div class="learn-nav">
      <button class="btn-lnav" id="btn-lprev" onclick="learnPrev()">← 前へ</button>
      <button class="btn-lnav" id="btn-lnext" onclick="learnNext()">次へ →</button>
    </div>
    <button class="btn-start-test" onclick="startSetTest()">✏️ このセットをテストする</button>
    <button class="btn-back" onclick="showSelect()">← セット選択に戻る</button>
  </div>

  <!-- 問題画面 -->
  <div id="sq">
    <div class="set-label-bar" id="set-label-bar"></div>
    <div class="flower-card">
      <!-- 通常問題：画像＋名前 -->
      <div id="q-forward">
        <div class="flower-img" id="img-wrap">
          <div id="q-svg-slot"></div>
          <img id="q-photo" class="flower-photo" style="display:none" alt="">
          <span class="flower-photo-credit" id="q-photo-credit" style="display:none"></span>
        </div>
        <div class="flower-info">
          <div class="flower-name" id="fn">—</div>
          <span class="flower-cat" id="fc"></span>
        </div>
      </div>
      <!-- 逆問題：コード番号表示 -->
      <div id="q-reverse" style="display:none">
        <div class="reverse-code-disp">
          <div class="reverse-code-label">このコード番号の花は？</div>
          <div class="reverse-code-num" id="rq-code">—</div>
        </div>
      </div>
    </div>
    <!-- ヒント（問題画面） -->
    <div class="q-hint" id="q-hint" style="display:none">
      <div id="q-hint-text"></div>
      <div class="q-hint-season" id="q-hint-season"></div>
    </div>
    <!-- 通常問題：テンキー入力 -->
    <div id="q-input-area">
      <div class="input-area">
        <div class="input-disp" id="id"><span class="cursor"></span></div>
        <button class="btn-ans" id="ba" onclick="checkAns()" disabled>回答</button>
      </div>
      <div class="numpad">
        <button class="num" onclick="pn('7')">7</button>
        <button class="num" onclick="pn('8')">8</button>
        <button class="num" onclick="pn('9')">9</button>
        <button class="num" onclick="pn('4')">4</button>
        <button class="num" onclick="pn('5')">5</button>
        <button class="num" onclick="pn('6')">6</button>
        <button class="num" onclick="pn('1')">1</button>
        <button class="num" onclick="pn('2')">2</button>
        <button class="num" onclick="pn('3')">3</button>
        <button class="num zero" onclick="pn('0')">0</button>
        <button class="num del"  onclick="pb()">⌫</button>
      </div>
    </div>
    <!-- 逆問題：選択肢 -->
    <div id="q-choices-area" style="display:none">
      <div class="choices-grid" id="choices-grid"></div>
    </div>
    <button class="btn-back" onclick="showSelect()" style="margin-top:8px">← セット選択に戻る</button>
  </div>

  <!-- 結果画面 -->
  <div id="sr">
    <div class="set-label-bar" id="set-label-bar-r"></div>
    <div class="result-card">
      <div class="result-top">
        <div class="result-badge" id="rb"></div>
        <div class="result-label" id="rl"></div>
        <div class="result-img" id="ri"></div>
        <div class="result-detail" id="rd"></div>
      </div>
      <div class="score-bar">
        <span>正解 <span class="sc-ok" id="sok">0</span></span>
        <span>不正解 <span class="sc-ng" id="sng">0</span></span>
        <span>計 <span id="stot">0</span></span>
      </div>
    </div>
    <button class="btn-next" onclick="nextQ()">次へ →</button>
  </div>

  <!-- 完了画面 -->
  <div id="sd">
    <div class="done-em" id="done-em">🎉</div>
    <div class="done-title" id="done-title">完了！</div>
    <div class="done-score" id="ds"></div>
    <div class="done-pass" id="done-pass"></div>
    <div class="done-actions">
      <button class="btn-restart" onclick="retrySet()">🔄 もう一度テスト</button>
      <button class="btn-sub-action" onclick="startLearnPhase()">📖 再学習してから挑戦</button>
      <button class="btn-sub-action" onclick="showSelect()">← セット選択に戻る</button>
    </div>
  </div>

</div>

<script>


// =====================================================================
// SVG イラスト（リアル描写版・アプリ内蔵）

// =====================================================================
// 花の写真（Wikipedia API 動的取得）
// =====================================================================
const photoCache = {};

async function fetchWikiPhoto(wikiTitle, imgEl, creditEl) {
  if (!wikiTitle) { imgEl.style.display='none'; return; }
  if (photoCache[wikiTitle] !== undefined) {
    const url = photoCache[wikiTitle];
    if (url) {
      imgEl.src = url;
      imgEl.style.display = 'block';
      const svgSlot = imgEl.parentElement.querySelector('div[id$="-slot"]');
      if(svgSlot) svgSlot.style.display = 'none';
      creditEl.textContent = '© Wikipedia CC BY-SA';
      creditEl.style.display = 'block';
    }
    return;
  }
  try {
    const url = `https://ja.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&pithumbsize=400&format=json&origin=*`;
    const res = await fetch(url);
    const json = await res.json();
    const page = Object.values(json.query.pages)[0];
    if (page.thumbnail && page.thumbnail.source) {
      photoCache[wikiTitle] = page.thumbnail.source;
      imgEl.src = page.thumbnail.source;
      imgEl.style.display = 'block';
      const svgSlot = imgEl.parentElement.querySelector('div[id$="-slot"]');
      if(svgSlot) svgSlot.style.display = 'none';
      creditEl.textContent = '© Wikipedia CC BY-SA';
      creditEl.style.display = 'block';
    } else {
      photoCache[wikiTitle] = null;
      imgEl.style.display = 'none';
    }
  } catch(e) {
    photoCache[wikiTitle] = null;
    imgEl.style.display = 'none';
  }
}

  1173:{hint:"コード1173はインパーチエンス（インパチェンス）鉢。夏の定番花壇苗。",season:"夏",wiki:"インパチェンス"},
  1174:{hint:"コード1174はイワタバコ（岩煙草）鉢。和の雰囲気。",season:"夏",wiki:"イワタバコ"},

  1176:{hint:"コード1176はペチュニア鉢。ラッパ形の花。春〜秋に長く咲く。",season:"春〜秋",wiki:"ペチュニア"},

  1179:{hint:"コード1179はプリムラ鉢。冬〜春の定番ポット花。",season:"冬〜春",wiki:"サクラソウ"},

  1183:{hint:"コード1183はポインセチア（苗）。",season:"秋〜冬",wiki:"ポインセチア"},
  1185:{hint:"コード1185はカンヨウ（観用植物）鉢。",season:"通年",wiki:""},
  1190:{hint:"コード1190はパンジー鉢。冬から春の花壇の主役。",season:"冬〜春",wiki:"パンジー"},
  1191:{hint:"コード1191はペチュニア（苗）。",season:"春〜夏",wiki:"ペチュニア"},
  1192:{hint:"コード1192はニチニチソウ（日々草）鉢。夏の酷暑に強い。",season:"夏〜秋",wiki:"ニチニチソウ"},
  1194:{hint:"コード1194はシクラメン（別品種・サイズ）鉢。",season:"冬",wiki:"シクラメン"},
  1195:{hint:"コード1195はカーネーション（鉢・苗）。",season:"春〜夏",wiki:"カーネーション"},
  1196:{hint:"コード1196は野菜苗。トマト・キュウリ等の苗。",season:"春",wiki:""},
  1197:{hint:"コード1197は苗。草花苗の総称コード。",season:"季節による",wiki:""},
  1198:{hint:"コード1198は花木根巻物。植え付け用の花木。",season:"季節による",wiki:""},
  1199:{hint:"コード1199は球根・種苗。",season:"季節による",wiki:""},
  1200:{hint:"コード1200は鉢物材料の総称コード。",season:"通年",wiki:""},
};


function getSVG(no){ return S[svgMap[no]] || S.default_kiri; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ── 状態 ──────────────────────────────────────────
const SET_SIZE = 20;
let filterMode = 'all';
let allFlowers = FLOWERS;
let setResults = {};

// テスト状態
let currentSetIdx = -1;
let queue = [], current = null, inputVal = '', scoreOk = 0, scoreNg = 0;
let setFlowers = [];
let isAllTest = false;
let wrongList = []; // 間違えた花のリスト
let isReviewRound = false; // 復習ラウンド中フラグ
let currentQuizMode = 'forward'; // 'forward' | 'reverse'
let choiceAnswered = false; // 選択肢問題回答済みフラグ

// 学習フェーズ状態
let learnList = [], learnIdx = 0;

// ── フィルター ────────────────────────────────────
function setFilter(mode){
  filterMode = mode;
  ['all','切り花','鉢物'].forEach(m=>{
    const id = m==='all'?'fb-all': m==='切り花'?'fb-kiri':'fb-hachi';
    document.getElementById(id).classList.toggle('active', m===mode);
  });
  allFlowers = filterMode==='all' ? FLOWERS : FLOWERS.filter(f=>f.cat===filterMode);
  setResults = {};
  buildSetGrid();
}

// ── セット選択 ────────────────────────────────────
function showSelect(){
  showScreen('select');
  buildSetGrid();
  document.getElementById('pf').style.width='0%';
  document.getElementById('pt').textContent='';
}

function buildSetGrid(){
  const grid = document.getElementById('set-grid');
  const sets = makeSets();
  let passedCount = 0;
  grid.innerHTML = sets.map((s,i)=>{
    const res = setResults[i]||{};
    const passed = res.passed||false;
    if(passed) passedCount++;
    const pct = (res.ok!==undefined) ? Math.round(res.ok/(res.ok+res.ng)*100) : null;
    const locked = false; // セット自由選択
    const cls = passed?'set-card passed':'set-card';
    const pctStr = pct!==null ? `<span class="set-pct ${passed?'ok':'ng'}">${pct}%</span>` : '';
    const lockIcon = '';
    return `<div class="${cls}" onclick="selectSet(${i})" data-set="${i}">
      ${lockIcon}
      <div class="set-num">セット ${i+1} ${passed?'🎖':''}</div>
      <div class="set-range">${s[0].name} 〜 ${s[s.length-1].name}</div>
      <div class="set-count">${s.length}問</div>
      ${pctStr}
    </div>`;
  }).join('');
  const pct = sets.length ? Math.round(passedCount/sets.length*100) : 0;
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pt').textContent = passedCount+'/'+sets.length+' セット合格';
}

function makeSets(){
  const sets = [];
  for(let i=0;i<allFlowers.length;i+=SET_SIZE) sets.push(allFlowers.slice(i,i+SET_SIZE));
  return sets;
}

function selectSet(idx){
  currentSetIdx = idx;
  isAllTest = false;
  setFlowers = makeSets()[idx];
  startLearnPhase();
}

// ── 学習フェーズ ──────────────────────────────────
function startLearnPhase(){
  learnList = [...setFlowers];
  learnIdx = 0;
  showScreen('learn');
  renderLearnCard();
}

function renderLearnCard(){
  const f = learnList[learnIdx];
  // SVG
  const learnSvgSlot = document.getElementById('learn-svg-slot');
  learnSvgSlot.innerHTML = getSVG(f.no);
  learnSvgSlot.style.display = '';  // SVGを毎回リセット表示
  // 写真
  const photoEl = document.getElementById('learn-photo');
  const creditEl = document.getElementById('learn-photo-credit');
  photoEl.style.display = 'none';
  creditEl.style.display = 'none';
  const info = FLOWER_INFO[f.no]||{};
  if(info.wiki) fetchWikiPhoto(info.wiki, photoEl, creditEl);

  document.getElementById('learn-name').textContent = f.name;
  document.getElementById('learn-cat').textContent = f.cat;
  document.getElementById('learn-code').textContent = f.no;
  document.getElementById('learn-prog').textContent = (learnIdx+1)+' / '+learnList.length;
  document.getElementById('learn-hint').textContent = info.hint || '';
  document.getElementById('learn-season').innerHTML = info.season ? '🌱 '+info.season : '';
  document.getElementById('btn-lprev').disabled = (learnIdx===0);
  document.getElementById('btn-lnext').textContent = learnIdx===learnList.length-1 ? 'テストへ →' : '次へ →';
}

function learnNext(){
  if(learnIdx < learnList.length-1){ learnIdx++; renderLearnCard(); }
  else startSetTest();
}
function learnPrev(){
  if(learnIdx>0){ learnIdx--; renderLearnCard(); }
}

// ── テストフェーズ ────────────────────────────────
function startSetTest(){
  // 通常→逆→復習 の3ラウンドを混在させる
  // 通常ラウンド：花名→コード入力（forward）
  // 逆ラウンド：コード→花名選択（reverse）は奇数問に挿入
  isReviewRound = false;
  wrongList = [];
  queue = shuffle([...setFlowers]);
  scoreOk=0; scoreNg=0; inputVal='';
  const lbl = isAllTest ? '全問テスト' : `セット ${currentSetIdx+1} テスト`;
  document.getElementById('set-label-bar').textContent = lbl;
  document.getElementById('set-label-bar-r').textContent = lbl;
  updateScore();
  showScreen('q');
  nextQ();
}

function startAllTest(){
  currentSetIdx = -1;
  isAllTest = true;
  setFlowers = allFlowers;
  startSetTest();
}

function nextQ(){
  if(queue.length===0){
    // 復習ラウンドがあるか
    if(!isReviewRound && wrongList.length>0){
      startReviewRound();
    } else {
      showDone();
    }
    return;
  }
  current = queue.shift();
  inputVal = '';
  choiceAnswered = false;
  // 問題モード決定：3問に1問は逆問題（reverse）
  const questionNum = setFlowers.length - queue.length;
  currentQuizMode = (questionNum % 3 === 0) ? 'reverse' : 'forward';
  if(isReviewRound) currentQuizMode = 'forward'; // 復習は通常
  renderQ();
  showScreen('q');
}

function startReviewRound(){
  isReviewRound = true;
  // wrongListをシャッフルして再出題
  queue = shuffle([...wrongList]);
  wrongList = [];
  const lbl = (isAllTest ? '全問テスト' : `セット ${currentSetIdx+1}`)+' — 🔄 復習ラウンド';
  document.getElementById('set-label-bar').textContent = lbl;
  document.getElementById('set-label-bar-r').textContent = lbl;
  nextQ();
}

function renderQ(){
  const info = FLOWER_INFO[current.no]||{};
  // ヒント表示
  const hintEl = document.getElementById('q-hint');
  if(info.hint){
    document.getElementById('q-hint-text').textContent = info.hint;
    document.getElementById('q-hint-season').textContent = info.season ? '🌱 旬：'+info.season : '';
    hintEl.style.display='block';
  } else {
    hintEl.style.display='none';
  }

  if(currentQuizMode === 'forward'){
    // 花名・画像を見せてコードを入力
    document.getElementById('q-forward').style.display='block';
    document.getElementById('q-reverse').style.display='none';
    document.getElementById('q-input-area').style.display='block';
    document.getElementById('q-choices-area').style.display='none';
    document.getElementById('fn').textContent = current.name;
    document.getElementById('fc').textContent = current.cat;
    // SVG
    const qSvgSlot = document.getElementById('q-svg-slot');
    qSvgSlot.innerHTML = getSVG(current.no);
    qSvgSlot.style.display = '';  // SVGを毎回リセット表示
    // 写真
    const photoEl = document.getElementById('q-photo');
    const creditEl = document.getElementById('q-photo-credit');
    photoEl.style.display='none'; creditEl.style.display='none';
    if(info.wiki) fetchWikiPhoto(info.wiki, photoEl, creditEl);
    updateInputDisp();
  } else {
    // コードを見せて花名を選択
    document.getElementById('q-forward').style.display='none';
    document.getElementById('q-reverse').style.display='block';
    document.getElementById('q-input-area').style.display='none';
    document.getElementById('q-choices-area').style.display='block';
    document.getElementById('rq-code').textContent = current.no;
    buildChoices();
  }
  updateProgress();
}

function buildChoices(){
  // 正解＋3つのダミー選択肢
  const pool = allFlowers.filter(f=>f.no!==current.no);
  const dummies = shuffle(pool).slice(0,3);
  const choices = shuffle([current, ...dummies]);
  const grid = document.getElementById('choices-grid');
  grid.innerHTML = choices.map(f=>
    `<button class="choice-btn" onclick="checkChoice(${f.no})">${f.name}</button>`
  ).join('');
}

function checkChoice(selectedNo){
  if(choiceAnswered) return;
  choiceAnswered = true;
  const ok = selectedNo === current.no;
  if(ok) scoreOk++; else { scoreNg++; wrongList.push(current); }
  // 視覚フィードバック
  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.disabled = true;
    if(parseInt(btn.getAttribute('onclick').replace('checkChoice(','').replace(')','')) === current.no){
      btn.classList.add('correct');
    } else if(parseInt(btn.getAttribute('onclick').replace('checkChoice(','').replace(')','')) === selectedNo && !ok){
      btn.classList.add('wrong');
    }
  });
  setTimeout(()=>{ renderResult(ok); showScreen('r'); }, 700);
}

function updateProgress(){
  const totalInRound = isReviewRound ? (wrongList.length + queue.length + 1) : setFlowers.length;
  const done = setFlowers.length - queue.length - (isReviewRound ? 0 : 0);
  const pct = totalInRound ? ((totalInRound - queue.length)/totalInRound*100) : 0;
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pt').textContent = (totalInRound-queue.length)+'/'+totalInRound;
}

function updateInputDisp(){
  const el=document.getElementById('id');
  const btn=document.getElementById('ba');
  if(inputVal===''){el.innerHTML='<span class="cursor"></span>';el.classList.remove('has-val');btn.disabled=true;}
  else{el.innerHTML=inputVal+'<span class="cursor"></span>';el.classList.add('has-val');btn.disabled=false;}
}

function pn(n){ if(inputVal.length>=4)return; inputVal+=n; updateInputDisp(); }
function pb(){ if(!inputVal.length)return; inputVal=inputVal.slice(0,-1); updateInputDisp(); }

function checkAns(){
  if(!current||!inputVal)return;
  const ok = parseInt(inputVal,10)===current.no;
  if(ok) scoreOk++; else { scoreNg++; wrongList.push(current); }
  renderResult(ok); showScreen('r');
}

function renderResult(ok){
  document.getElementById('rb').textContent = ok?'✅':'❌';
  const lbl=document.getElementById('rl');
  lbl.textContent = ok?'正　解':'不正解';
  lbl.className = 'result-label '+(ok?'ok':'ng');
  // 結果画像
  const ri = document.getElementById('ri');
  ri.innerHTML = getSVG(current.no);
  const info = FLOWER_INFO[current.no]||{};
  {
    const img = document.createElement('img');
    img.style.cssText='width:100%;height:100%;object-fit:cover;display:none';
    const credit = document.createElement('span');
    credit.style.cssText='position:absolute;bottom:2px;right:4px;font-size:.55rem;color:rgba(255,255,255,.8);background:rgba(0,0,0,.3);padding:1px 4px;border-radius:3px;display:none';
    ri.style.position='relative';
    ri.appendChild(img); ri.appendChild(credit);
    if(info.wiki) fetchWikiPhoto(info.wiki, img, credit);
  }
  const det=document.getElementById('rd');
  const modeTag = currentQuizMode==='reverse'
    ? '<span class="quiz-mode-badge reverse">コード→名前</span>'
    : isReviewRound
    ? '<span class="quiz-mode-badge review">🔄 復習</span>'
    : '<span class="quiz-mode-badge forward">名前→コード</span>';
  if(ok){
    det.innerHTML=`<div class="r-name">${current.name} ${modeTag}</div>
      <div style="margin-top:4px;font-size:.75rem;color:var(--text-sub)">${current.cat}</div>
      <div style="margin-top:8px;">コード番号 <span class="r-code">${current.no}</span></div>`;
  } else {
    det.innerHTML=`<div class="r-name">${current.name} ${modeTag}</div>
      <div style="margin-top:4px;font-size:.75rem;color:var(--text-sub)">${current.cat}</div>
      <div class="r-ans-ng" style="margin-top:8px;">${currentQuizMode==='forward'?'あなたの回答：'+inputVal:''}</div>
      <div style="margin-top:4px;font-size:.82rem;color:var(--text-sub)">正解のコード</div>
      <div class="r-correct-code">${current.no}</div>`;
  }
  if(info.hint){
    det.innerHTML += `<div style="margin-top:8px;padding:7px 10px;background:var(--surface2);border-radius:8px;font-size:.72rem;color:var(--text-sub);line-height:1.6;border-left:3px solid var(--accent2)">${info.hint}</div>`;
  }
  updateScore();
}

function updateScore(){
  document.getElementById('sok').textContent=scoreOk;
  document.getElementById('sng').textContent=scoreNg;
  document.getElementById('stot').textContent=scoreOk+scoreNg;
}

function showDone(){
  const tot=scoreOk+scoreNg, pct=tot?Math.round(scoreOk/tot*100):0;
  const passed = pct>=80;
  if(!isAllTest && currentSetIdx>=0){
    setResults[currentSetIdx] = {ok:scoreOk, ng:scoreNg, passed};
  }
  document.getElementById('done-em').textContent = passed?'🎖': pct>=60?'😊':'💪';
  document.getElementById('done-title').textContent = isAllTest?'全問テスト完了！':`セット ${currentSetIdx+1} 完了！`;
  document.getElementById('ds').textContent = `${tot}問中 ${scoreOk}問正解（${pct}%）`;
  const passEl = document.getElementById('done-pass');
  if(isAllTest){
    passEl.textContent='';
  } else if(passed){
    passEl.innerHTML='<span class="pass-badge">🎖 合格！次のセットが解放されました</span>';
  } else {
    passEl.innerHTML=`<span class="fail-badge">合格ライン80%まであと${80-pct}%。<br>再学習してもう一度チャレンジ！</span>`;
  }
  document.getElementById('pf').style.width='100%';
  document.getElementById('pt').textContent=tot+'/'+tot;
  showScreen('done');
}

function retrySet(){
  if(isAllTest) startAllTest(); else startSetTest();
}

function showScreen(s){
  const map = {select:'s-select', learn:'s-learn', q:'sq', r:'sr', done:'sd'};
  Object.keys(map).forEach(k=>{
    document.getElementById(map[k]).style.display = (s===k)?'flex':'none';
  });
}

// キーボード操作
document.addEventListener('keydown',e=>{
  const isQ = document.getElementById('sq').style.display!=='none';
  const isR = document.getElementById('sr').style.display!=='none';
  const isL = document.getElementById('s-learn').style.display!=='none';
  if(isQ && currentQuizMode==='forward'){
    if(e.key>='0'&&e.key<='9') pn(e.key);
    else if(e.key==='Backspace') pb();
    else if(e.key==='Enter') checkAns();
  } else if(isR){
    if(e.key==='Enter') nextQ();
  } else if(isL){
    if(e.key==='ArrowRight'||e.key===' ') learnNext();
    else if(e.key==='ArrowLeft') learnPrev();
  }
});

// 起動
showSelect();
</script>
